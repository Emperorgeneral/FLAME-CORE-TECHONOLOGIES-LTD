global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'flame-core'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - Host system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'vps-primary'

  # cAdvisor - Docker container metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:8080']

  # Flame Core API - If it exposes metrics
  - job_name: 'flame-api'
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
